name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0). Used for manual runs.'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # ===========================================================================
  # Per-platform tarballs (modelled after Ollama's release asset layout)
  # ===========================================================================
  # Naming:
  #   darwin     -> erllama_server-<vsn>-darwin-<arch>.tgz
  #   linux      -> erllama_server-<vsn>-linux-<arch>[-<variant>].tar.zst
  #
  # Variants today (Linux amd64 only):
  #   (none)     -> CPU
  #   cuda12     -> NVIDIA CUDA 12 (-DGGML_CUDA=ON)
  #   rocm       -> AMD ROCm       (-DGGML_HIP=ON)
  #
  # Each tarball bundles:
  #   bin/erllama_server   release entry point
  #   bin/erllama          CLI escript (talks to a running daemon)
  #   lib/  erts-<vsn>/  releases/
  #   LICENSE  README.md
  # ===========================================================================
  tarball-darwin:
    name: Tarball darwin-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: Build release + escript
        run: |
          rebar3 as prod release
          rebar3 as prod escriptize
      - name: Bundle escript into the release
        run: cp _build/prod/bin/erllama _build/prod/rel/erllama_server/bin/erllama
      - name: Stage release + extras
        run: |
          DEST="_build/prod/rel/erllama_server"
          cp README.md CHANGELOG.md LICENSE "$DEST/"
      - name: Pack .tgz
        id: pack
        run: |
          VSN="${GITHUB_REF_NAME#v}"
          [ -n "$VSN" ] || VSN="${{ inputs.tag }}"
          [ -n "$VSN" ] || VSN="dev"
          NAME="erllama_server-${VSN}-darwin-${{ matrix.arch }}"
          mkdir -p dist
          tar -C _build/prod/rel -czf "dist/${NAME}.tgz" erllama_server
          (cd dist && shasum -a 256 "${NAME}.tgz" > "${NAME}.tgz.sha256")
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.name }}
          path: dist/*

  tarball-linux:
    name: Tarball linux-${{ matrix.arch }}${{ matrix.suffix }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            suffix: ""
            erllama_opts: ""
          - arch: amd64
            runner: ubuntu-24.04
            suffix: "-cuda12"
            erllama_opts: "-DGGML_CUDA=ON -DGGML_NATIVE=OFF"
          - arch: amd64
            runner: ubuntu-24.04
            suffix: "-rocm"
            erllama_opts: "-DGGML_HIP=ON -DGGML_NATIVE=OFF"
          - arch: arm64
            runner: ubuntu-24.04-arm
            suffix: ""
            erllama_opts: ""
    steps:
      - uses: actions/checkout@v5
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          rebar3-version: '3.25.0'
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential zstd
      - name: CUDA toolkit (cuda12 variant only)
        if: matrix.suffix == '-cuda12'
        run: |
          curl -fsSL https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/cuda-keyring_1.1-1_all.deb -o /tmp/keyring.deb
          sudo dpkg -i /tmp/keyring.deb
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cuda-toolkit-12-4
      - name: ROCm toolkit (rocm variant only)
        if: matrix.suffix == '-rocm'
        run: |
          sudo apt-get install -y --no-install-recommends gnupg2 wget
          wget -qO - https://repo.radeon.com/rocm/rocm.gpg.key | sudo gpg --dearmour -o /etc/apt/keyrings/rocm.gpg
          echo 'deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/6.0 jammy main' \
            | sudo tee /etc/apt/sources.list.d/rocm.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends rocm-hip-sdk rocm-hip-runtime
      - name: Build release + escript
        env:
          ERLLAMA_OPTS: ${{ matrix.erllama_opts }}
        run: |
          if [ -n "${{ matrix.erllama_opts }}" ]; then
            [ -d /usr/local/cuda ] && export PATH=/usr/local/cuda/bin:$PATH
            [ -d /opt/rocm ] && export PATH=/opt/rocm/bin:$PATH
          fi
          rebar3 as prod release
          rebar3 as prod escriptize
      - name: Bundle escript into the release
        run: cp _build/prod/bin/erllama _build/prod/rel/erllama_server/bin/erllama
      - name: Stage extras
        run: |
          DEST="_build/prod/rel/erllama_server"
          cp README.md CHANGELOG.md LICENSE "$DEST/"
      - name: Pack .tar.zst
        id: pack
        run: |
          VSN="${GITHUB_REF_NAME#v}"
          [ -n "$VSN" ] || VSN="${{ inputs.tag }}"
          [ -n "$VSN" ] || VSN="dev"
          NAME="erllama_server-${VSN}-linux-${{ matrix.arch }}${{ matrix.suffix }}"
          mkdir -p dist
          tar -C _build/prod/rel --zstd -cf "dist/${NAME}.tar.zst" erllama_server
          (cd dist && sha256sum "${NAME}.tar.zst" > "${NAME}.tar.zst.sha256")
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.name }}
          path: dist/*

  # ===========================================================================
  # Install script (architecture-detecting, mirrors Ollama's install.sh)
  # ===========================================================================
  install-script:
    name: install.sh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/upload-artifact@v4
        with:
          name: install-script
          path: scripts/install.sh

  # ===========================================================================
  # Docker images
  # ===========================================================================
  docker-cpu:
    name: Docker image (CPU)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erllama_server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

  docker-cuda:
    name: Docker image (CUDA)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/erllama_server
          flavor: |
            suffix=-cuda,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=tag
            type=raw,value=cuda,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.cuda
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cuda
          cache-to: type=gha,mode=max,scope=cuda

  # ===========================================================================
  # GitHub Release with all assets attached
  # ===========================================================================
  publish:
    name: GitHub Release
    needs: [tarball-darwin, tarball-linux, install-script, docker-cpu, docker-cuda]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Show artefacts
        run: ls -lh dist/
      - name: Release notes from CHANGELOG
        id: notes
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            /^## \[/ {
              if (in_section) exit
              gsub("[][]", "", $0); gsub("## ", "", $0)
              if (index($0, v) == 1) { in_section=1; next }
            }
            in_section { print }
          ' CHANGELOG.md > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: dist/*
          draft: false
          prerelease: false
